<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Games</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        const favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function toggleFavorite(game) {
            const index = favorites.indexOf(game);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(game);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateFavoriteButton(game);
        }

        function updateFavoriteButton(game) {
            const button = document.getElementById(`favorite-${game}`);
            if (favorites.includes(game)) {
                button.textContent = '★ Unfavorite';
            } else {
                button.textContent = '☆ Favorite';
            }
        }

        function loadFavorites() {
            favorites.forEach(game => {
                updateFavoriteButton(game);
            });
        }

        window.onload = loadFavorites;
    </script>
</head>
<body>
    <h1>All Games</h1>
    <div id="games">
        <div class="game">
            <h2>Game 1</h2>
            <button id="favorite-Game 1" onclick="toggleFavorite('Game 1')">☆ Favorite</button>
        </div>
        <div class="game">
            <h2>Game 2</h2>
            <button id="favorite-Game 2" onclick="toggleFavorite('Game 2')">☆ Favorite</button>
        </div>
        <!-- Add more games as needed -->
    </div>
</body>
</html>
